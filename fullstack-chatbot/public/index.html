<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DialogueDB Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
    header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    header h1 { font-size: 18px; font-weight: 600; }
    .controls { display: flex; gap: 8px; align-items: center; margin-left: auto; }
    .controls label { font-size: 13px; color: #666; }
    .controls input { padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; width: 120px; }
    .controls button { padding: 4px 12px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; }
    .controls button:hover { background: #f0f0f0; }
    .sidebar { display: flex; gap: 4px; padding: 0 16px 8px; background: #fff; border-bottom: 1px solid #e0e0e0; overflow-x: auto; }
    .sidebar button { padding: 4px 10px; border: 1px solid #ddd; border-radius: 12px; background: #f8f8f8; cursor: pointer; font-size: 12px; white-space: nowrap; }
    .sidebar button.active { background: #e8f0fe; border-color: #4285f4; color: #1a73e8; }
    .sidebar button:hover { background: #eee; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .message { max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
    .message.user { align-self: flex-end; background: #1a73e8; color: #fff; border-bottom-right-radius: 4px; }
    .message.assistant { align-self: flex-start; background: #fff; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
    .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: #999; font-size: 14px; }
    footer { background: #fff; border-top: 1px solid #e0e0e0; padding: 12px 16px; }
    footer form { display: flex; gap: 8px; }
    footer input { flex: 1; padding: 10px 14px; border: 1px solid #ccc; border-radius: 20px; font-size: 14px; outline: none; }
    footer input:focus { border-color: #1a73e8; }
    footer button { padding: 10px 20px; border: none; border-radius: 20px; background: #1a73e8; color: #fff; font-size: 14px; cursor: pointer; }
    footer button:hover { background: #1557b0; }
    footer button:disabled { background: #ccc; cursor: default; }
  </style>
</head>
<body>
  <header>
    <h1>DialogueDB Chat</h1>
    <div class="controls">
      <label>User: <input id="userId" type="text" placeholder="your-name" /></label>
      <button id="newChat">+ New Chat</button>
      <button id="deleteChat">Delete</button>
    </div>
  </header>
  <div class="sidebar" id="sidebar"></div>
  <div id="messages">
    <div class="empty-state">Send a message to start chatting</div>
  </div>
  <footer>
    <form id="chatForm">
      <input id="messageInput" type="text" placeholder="Type a message..." autocomplete="off" />
      <button type="submit" id="sendBtn">Send</button>
    </form>
  </footer>

  <script>
    const messagesEl = document.getElementById("messages");
    const chatForm = document.getElementById("chatForm");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const userIdInput = document.getElementById("userId");
    const newChatBtn = document.getElementById("newChat");
    const deleteChatBtn = document.getElementById("deleteChat");
    const sidebarEl = document.getElementById("sidebar");

    let dialogueId = localStorage.getItem("dialogueId");
    let userId = localStorage.getItem("userId") || "user-1";
    userIdInput.value = userId;

    function getUserId() {
      const val = userIdInput.value.trim() || "user-1";
      if (val !== userId) {
        userId = val;
        localStorage.setItem("userId", userId);
        dialogueId = null;
        localStorage.removeItem("dialogueId");
      }
      return userId;
    }

    function addMessage(role, content) {
      const emptyState = messagesEl.querySelector(".empty-state");
      if (emptyState) emptyState.remove();

      const div = document.createElement("div");
      div.className = "message " + role;
      div.textContent = content;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function clearMessages() {
      messagesEl.innerHTML = '<div class="empty-state">Send a message to start chatting</div>';
    }

    async function loadHistory() {
      if (!dialogueId) return;
      try {
        const res = await fetch("/api/history/" + encodeURIComponent(dialogueId));
        const data = await res.json();
        if (data.messages && data.messages.length > 0) {
          clearMessages();
          const emptyState = messagesEl.querySelector(".empty-state");
          if (emptyState) emptyState.remove();
          for (const m of data.messages) {
            addMessage(m.role, m.content);
          }
        }
      } catch (err) {
        console.error("Failed to load history:", err);
      }
    }

    async function loadConversations() {
      try {
        const res = await fetch("/api/conversations?userId=" + encodeURIComponent(getUserId()));
        const data = await res.json();
        sidebarEl.innerHTML = "";
        for (const c of data.conversations || []) {
          const btn = document.createElement("button");
          btn.textContent = c.label || c.id.slice(0, 12);
          btn.dataset.id = c.id;
          if (c.id === dialogueId) btn.className = "active";
          btn.addEventListener("click", () => {
            dialogueId = c.id;
            localStorage.setItem("dialogueId", dialogueId);
            clearMessages();
            loadHistory();
            loadConversations();
          });
          sidebarEl.appendChild(btn);
        }
      } catch (err) {
        console.error("Failed to load conversations:", err);
      }
    }

    chatForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const message = messageInput.value.trim();
      if (!message) return;

      const currentUserId = getUserId();
      messageInput.value = "";
      sendBtn.disabled = true;

      addMessage("user", message);

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ dialogueId, userId: currentUserId, message }),
        });

        const data = await res.json();

        if (!res.ok) {
          addMessage("assistant", "Error: " + (data.error || "Something went wrong"));
          return;
        }

        if (data.dialogueId && data.dialogueId !== dialogueId) {
          dialogueId = data.dialogueId;
          localStorage.setItem("dialogueId", dialogueId);
          loadConversations();
        }

        addMessage("assistant", data.reply);
      } catch (err) {
        addMessage("assistant", "Error: Could not reach the server");
      } finally {
        sendBtn.disabled = false;
        messageInput.focus();
      }
    });

    newChatBtn.addEventListener("click", () => {
      dialogueId = null;
      localStorage.removeItem("dialogueId");
      clearMessages();
      loadConversations();
    });

    deleteChatBtn.addEventListener("click", async () => {
      if (!dialogueId) return;
      try {
        await fetch("/api/conversations/" + encodeURIComponent(dialogueId), { method: "DELETE" });
        dialogueId = null;
        localStorage.removeItem("dialogueId");
        clearMessages();
        loadConversations();
      } catch (err) {
        console.error("Failed to delete:", err);
      }
    });

    userIdInput.addEventListener("change", () => {
      getUserId();
      clearMessages();
      loadHistory();
      loadConversations();
    });

    loadHistory();
    loadConversations();
  </script>
</body>
</html>

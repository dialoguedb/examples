name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: read
    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.DIALOGUEDB_BOT_APP_ID }}
          private-key: ${{ secrets.DIALOGUEDB_BOT_PRIVATE_KEY }}
          owner: dialoguedb

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.bot-token.outputs.token }}
          allowed_bots: "dialoguedb-bot[bot]"
          claude_args: |
            --model claude-opus-4-6
            --allowedTools "Read,Glob,Grep,Bash(npm install:*),Bash(npx tsc:*),Bash(node:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*)"
            --system-prompt "Review this example PR. Check: 1) Does it compile? Run npm install && npx tsc --noEmit in the example directory. 2) README quality — clear setup, explains what it does and why, runnable in under 2 minutes. 3) Code quality — uses real dialogue-db SDK, handles errors, minimal boilerplate. 4) Is it useful? Would a developer evaluating DialogueDB find this helpful? 5) .env.example exists with all required vars documented, no real keys. Be constructive. Focus on whether it works and whether it's useful."
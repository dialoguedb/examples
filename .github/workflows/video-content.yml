name: Video Content
run-name: "Video Content — ${{ github.event_name == 'workflow_dispatch' && format('backfill: {0}', github.event.inputs.target) || 'new examples' }}"

# Generates YouTube script packages for examples, following the show bible in HQ
# (notes/youtube-show-bible.md). One PR per example. The bot writes the scripts;
# a human records them.
#
# Triggers:
#   - push to main: any example dir touched by the push that has no video/ folder yet
#     (this is how a freshly merged example gets its scripts).
#   - workflow_dispatch: backfill. target="all" (default) does every example missing
#     video/, or pass a single example directory name.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Example directory to generate scripts for, or "all" to backfill every example missing a video/ folder'
        required: false
        default: 'all'

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      examples: ${{ steps.find.outputs.examples }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need history so a push event can diff against the previous commit.
          fetch-depth: 0

      - name: Decide which examples need scripts
        id: find
        env:
          EVENT_NAME: ${{ github.event_name }}
          TARGET: ${{ github.event.inputs.target }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          : > /tmp/candidates

          is_example() { [ -f "$1/package.json" ]; }
          needs_scripts() { [ ! -d "$1/video" ]; }

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -z "$TARGET" ] || [ "$TARGET" = "all" ]; then
              for d in */; do
                d="${d%/}"
                [ "$d" = ".github" ] && continue
                is_example "$d" && needs_scripts "$d" && echo "$d" >> /tmp/candidates
              done
            else
              if is_example "$TARGET"; then
                echo "$TARGET" >> /tmp/candidates
              else
                echo "::warning::'$TARGET' is not an example directory (no package.json); nothing to do"
              fi
            fi
          else
            # push: only example dirs actually changed by this push, that still lack video/.
            # If the previous SHA is unknown (first push, force push), fall back to HEAD~1.
            BASE="$BEFORE_SHA"
            if ! git rev-parse --quiet --verify "${BASE}^{commit}" >/dev/null 2>&1; then
              BASE="$(git rev-parse --quiet --verify 'HEAD~1' || true)"
            fi
            if [ -n "$BASE" ]; then
              CHANGED_DIRS="$(git diff --name-only "$BASE" "$AFTER_SHA" | awk -F/ 'NF>1 {print $1}' | sort -u)"
            else
              CHANGED_DIRS="$(for d in */; do echo "${d%/}"; done)"
            fi
            for d in $CHANGED_DIRS; do
              [ "$d" = ".github" ] && continue
              is_example "$d" && needs_scripts "$d" && echo "$d" >> /tmp/candidates
            done
          fi

          EXAMPLES_JSON="$(sort -u /tmp/candidates | jq -R . | jq -cs 'map(select(length > 0))')"
          [ -n "$EXAMPLES_JSON" ] || EXAMPLES_JSON="[]"
          echo "examples=$EXAMPLES_JSON" >> "$GITHUB_OUTPUT"
          echo "Examples needing scripts: $EXAMPLES_JSON"

  generate:
    needs: detect
    if: needs.detect.outputs.examples != '' && needs.detect.outputs.examples != '[]'
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        example: ${{ fromJSON(needs.detect.outputs.examples) }}
    concurrency:
      group: video-content-${{ matrix.example }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.DIALOGUEDB_BOT_APP_ID }}
          private-key: ${{ secrets.DIALOGUEDB_BOT_PRIVATE_KEY }}
          owner: dialoguedb

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.bot-token.outputs.token }}

      - name: Checkout show bible from HQ (read-only)
        uses: actions/checkout@v4
        with:
          repository: dialoguedb/hq
          token: ${{ steps.bot-token.outputs.token }}
          path: .hq-context
          sparse-checkout: |
            notes
            content-context.md
          sparse-checkout-cone-mode: false

      - name: Configure git
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
        run: |
          git config user.name "dialoguedb-bot[bot]"
          git config user.email "dialoguedb-bot[bot]@users.noreply.github.com"
          git config --global credential.helper store
          echo "https://x-access-token:${GH_TOKEN}@github.com" > ~/.git-credentials
          # Never let the HQ context checkout get committed into this repo.
          echo ".hq-context/" >> .git/info/exclude

      - name: Create working branch
        id: branch
        run: |
          BRANCH_NAME="video/${{ matrix.example }}-${{ github.run_number }}"
          git checkout -b "$BRANCH_NAME"
          echo "name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.bot-token.outputs.token }}
          allowed_bots: "dialoguedb-bot[bot]"
          display_report: "false"
          claude_args: |
            --allowedTools "Read,Write,Glob,Grep,Bash(cat:*),Bash(ls:*),Bash(mkdir:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git status:*),Bash(git diff:*),Bash(gh pr create:*),Bash(gh pr view:*),Bash(gh pr list:*),WebFetch(domain:backend.dialoguedb.com),WebFetch(domain:docs.dialoguedb.com),WebFetch(domain:www.npmjs.com),WebFetch(domain:npmjs.com)"
            --model ${{ vars.CLAUDE_MODEL || 'claude-opus-4-6' }}
            --max-turns 60
          prompt: |
            You write YouTube video scripts for the DialogueDB channel. Your output is recorded by a human, so it must be ready to read aloud.

            ## The one rule that overrides everything
            The show bible is the source of truth. Read it fully before writing a single word:
            - `.hq-context/notes/youtube-show-bible.md` — the format, voice, beat sheets, script template, title and thumbnail formulas, naming (flagship series is "Stateful", shorts series is "Quick Save").
            - `.hq-context/content-context.md` — product facts, voice rules, links.

            Follow the bible exactly: the flagship beat sheet (section 6), the human-VO script template (section 8), the shorts spec (section 7), and the title/thumbnail formulas. Match the worked sample in section 13 for quality and shape.

            ## Your subject
            The example: `${{ matrix.example }}/`

            Study it before writing:
            - Read `${{ matrix.example }}/README.md` and every file under `${{ matrix.example }}/src/`.
            - Read its `package.json` to know the run commands.
            - Use the example's `${{ matrix.example }}` entry in the bible's Example -> Episode map (section 12) as your starting angle, if present.

            Never invent product facts, limits, or pricing. If you need live numbers, fetch `https://backend.dialoguedb.com/api/public/meta`. You may fetch `https://www.npmjs.com/package/dialogue-db` for SDK detail.

            ## What to produce
            Create exactly these three files in `${{ matrix.example }}/video/`:

            1. `script.md` — the full flagship ("Stateful") script using the section 8 template: timed beats, two-track VO + SCREEN, delivery notes ([emphasis], [slow down], [beat]). Target 6 to 8 minutes. The cold open must show the payoff first (the cold-restart "it still remembers" moment, or this example's equivalent core demo). End with the CTA driving to this example's repo folder and a free API key.

            2. `shorts.md` — 2 to 3 "Quick Save" shorts derived from the flagship's moves, each 30 to 60 seconds, hook in the first 2 seconds, one demo, one CTA card. Follow the section 7 beat sheet.

            3. `metadata.md` — 3 to 5 SEO-first title options (keyword-front-loaded per section 6), a thumbnail concept (claim text + visual), a YouTube description with chapters/timestamps, and 8 to 12 tags.

            Quality bar: a developer watching this should understand the problem in 15 seconds and want to clone the repo by the end. No "hey guys, welcome back". No hype adjectives. Earn the viewer's time.

            ## Ship it
            Branch: `${{ steps.branch.outputs.name }}` (already created and checked out).

            1. Stage ONLY your new files: `git add ${{ matrix.example }}/video`. Do not run `git add .` or `git add -A` — there is a `.hq-context` checkout in the tree that must never be committed.
            2. Commit with a clear message.
            3. Push the branch.
            4. Open a PR against `main` titled `Add Stateful video scripts for ${{ matrix.example }}`. In the body: one line on the episode angle, the three files added, and a note that it is ready for a human to record. Do not mark anyone as a reviewer.
